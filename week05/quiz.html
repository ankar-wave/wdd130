<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML and CSS quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main class="box">
        <h1>✅ HTML & CSS Online Quiz</h1>
        <form class="box">

            <div class="quiz-item box">
                <!-- Q1: Text input -->
                <label for="q1">Q1. What does HTML stand for?</label>
                <input type="text" id="q1" name="q1" placeholder="Type your answer here" required>
            </div>
            <div class="quiz-item box">
                <!-- Q2: Textarea -->
                <label for="q2">Q2. Briefly explain the difference between inline CSS and external
                    CSS:</label>
                <textarea id="q2" name="q2" rows="4" placeholder="Your explanation..."
                  required></textarea>
            </div>
            <div class="quiz-item box">
                <!-- Q3: Select dropdown -->
                <label for="q3">Q3. Which HTML element is used to create a hyperlink?</label>
                <select id="q3" name="q3" required>
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="a">&lt;a&gt;</option>
                    <option value="link">&lt;link&gt;</option>
                    <option value="href">href attribute</option>
                </select>
            </div>
            <div class="quiz-item box">
                <!-- Q4: Number input -->
                <label for="q4">Q4. In CSS, what is the bottom margin given this
                    declaration?</label>
                <code class="box">margin: 10px 5px 15px;</code>
                <input type="number" id="q4" name="q4">
            </div>
            <button type="submit">Submit Quiz for Grading</button>
        </form>
    </main>
</body>

</html>
