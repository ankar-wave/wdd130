<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Rafting Company for inquiries, reservations, or suggestions. Find our address, phone, email, and meet our team.">
    <meta name="author" content="George Njura">
    <title>White Water Rafting - Contact Us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="header-container">
            <img src="images/logo.jpg" alt="Rafting Site Logo">
            <nav class="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- Company Info Section -->
        <section class="company-info">
            <h2>White Water Rafting Company</h2>
            <p>123 Mai Mahiu Street<br>Nakuru, Kenya</p>
            <p>+254 711 999 999<br>info@whitewater.com</p>

            <div class="map-form-container">
                <iframe src="https://www.google.com/maps/embed?pb=YOUR_MAP_EMBED_CODE"
                  allowfullscreen="" loading="lazy"></iframe>

                <form>
                    <label for="username">Name:</label>
                    <input type="text" id="username" name="username" placeholder="Your name"
                      required>

                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" placeholder="Your email"
                      required>

                    <label for="purpose">Message Purpose:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="purpose" value="general"> General
                            Inquiry</label>
                        <label><input type="radio" name="purpose" value="reservation"> Reservation
                            Question</label>
                        <label><input type="radio" name="purpose" value="suggestion"> Website
                            Suggestion</label>

                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5"
                          placeholder="Type your message here..."></textarea>

                        <label>
                            <input type="checkbox" name="newsletter"> Please subscribe me to the
                            monthly
                            newsletter
                        </label>

                        <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </section>

        <!-- Employee Profiles -->
        <section class="team">
            <h2>We Are Here to Serve You</h2>
            <div class="team-gallery">
                <figure>
                    <img src="images/employee1.jpg" alt="Employee Profile">
                    <figcaption>Ken Kinuthia – Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Employee Profile">
                    <figcaption>Jane Kumbuka – Safety Officer</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Employee Profile">
                    <figcaption>Dave Gatonye – Reservations Manager</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 🔹 White Water Rafting 🔹 George Njura</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank"><img src="images/facebook.jpg"
                  alt="Facebook"></a>
            <a href="https://linkedin.com" target="_blank"><img src="images/linkedin.jpg"
                  alt="LinkedIn"></a>
            <a href="https://instagram.com" target="_blank"><img src="images/instagram.jpg"
                  alt="Instagram"></a>
        </nav>
    </footer>
</body>

</html>
